<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9923a"/>
      <stop offset="100%" stop-color="#a05848"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="80" height="80" rx="20" fill="#1e1208"/>

  <!-- Arch / doorway mark (white version on dark bg) -->
  <rect x="14" y="14" width="52" height="52" rx="26" fill="none" stroke="url(#g1)" stroke-width="3"/>
  <!-- Floor line -->
  <line x1="14" y1="54" x2="66" y2="54" stroke="url(#g1)" stroke-width="1.8" opacity=".4"/>
  <!-- Sofa -->
  <rect x="22" y="45" width="36" height="8" rx="4" fill="url(#g1)" opacity=".9"/>
  <rect x="22" y="41" width="7" height="12" rx="3.5" fill="url(#g1)" opacity=".75"/>
  <rect x="51" y="41" width="7" height="12" rx="3.5" fill="url(#g1)" opacity=".75"/>
  <!-- Pendant dot -->
  <circle cx="40" cy="26" r="2.8" fill="url(#g1)" opacity=".7"/>
  <line x1="40" y1="14" x2="40" y2="23.2" stroke="url(#g1)" stroke-width="1.4" opacity=".4"/>
</svg>
